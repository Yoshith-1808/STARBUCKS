<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Forgot Password - Security Questions')}"></head>

<body class="bg-dark min-vh-100 d-flex align-items-center">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="text-center mb-4">
                <i class="bi bi-patch-question text-primary" style="font-size:3rem"></i>
                <h2 class="text-white fw-bold mt-2">Security Questions</h2>
            </div>

            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-4">
                    <h5 class="card-title text-center mb-3">Answer Questions</h5>
                    <p class="text-muted text-center small mb-4">Enter your email and the answers to your two
                        security questions to confirm your identity.</p>

                    <div th:if="${error}" class="alert alert-danger py-2">
                        <small th:text="${error}"></small>
                    </div>

                    <form th:action="@{/forgot-password/questions}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <div class="mb-3">
                            <label class="form-label fw-medium">Email Address</label>
                            <input type="email" name="email" class="form-control"
                                   placeholder="your-email@example.com" required autofocus />
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-medium text-primary">Security Question 1 Answer</label>
                            <input type="password" name="answer1" class="form-control"
                                   placeholder="Enter your answer" required />
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-medium text-primary">Security Question 2 Answer</label>
                            <input type="password" name="answer2" class="form-control"
                                   placeholder="Enter your answer" required />
                        </div>

                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-primary btn-lg fw-semibold">
                                Verify Answers
                            </button>
                        </div>

                        <div class="text-center">
                            <a th:href="@{/forgot-password}" class="text-decoration-none text-muted small">
                                <i class="bi bi-arrow-left me-1"></i>Choose another method
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
