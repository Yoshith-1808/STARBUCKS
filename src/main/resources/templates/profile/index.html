<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('My Profile')}"></head>

<body class="d-flex flex-column min-vh-100 bg-light">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container py-5 flex-grow-1">
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show shadow-sm">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${success}"></span>
        <button class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show shadow-sm">
        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
        <button class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row g-4">
        <!-- User Details Section -->
        <div class="col-lg-4">
            <div class="card border-0 shadow-sm h-100 overflow-hidden text-center">
                <div class="bg-primary" style="height: 100px;"></div>
                <div class="card-body px-4 pb-4" style="margin-top: -50px;">
                    <div
                            class="user-avatar-profile rounded-circle border border-4 border-white shadow-sm mb-3 mx-auto">
                        <i class="bi bi-person-fill"></i>
                    </div>
                    <h4 class="fw-bold mb-1"
                        th:text="${user.firstName != null ? user.firstName + ' ' + user.lastName : user.username}">
                        Name</h4>
                    <p class="text-muted mb-3" th:text="${user.email}">email@example.com</p>

                    <div class="d-flex justify-content-center gap-2 mb-4">
                            <span class="badge rounded-pill"
                                  th:classappend="${user.twoFactorEnabled} ? 'bg-success' : 'bg-warning text-dark'">
                                <i class="bi"
                                   th:classappend="${user.twoFactorEnabled} ? 'bi-shield-check' : 'bi-shield-exclamation'"></i>
                                2FA <span th:text="${user.twoFactorEnabled} ? 'Enabled' : 'Disabled'"></span>
                            </span>
                        <span class="badge rounded-pill bg-primary">
                                <i class="bi bi-person-badge"></i> Member
                            </span>
                    </div>

                    <div class="d-grid gap-2">
                        <button class="btn btn-outline-primary" data-bs-toggle="modal"
                                data-bs-target="#editProfileModal">
                            <i class="bi bi-pencil-square me-2"></i>Edit Profile
                        </button>
                        <a th:href="@{/profile/change-password}" class="btn btn-outline-secondary">
                            <i class="bi bi-key me-2"></i>Change Master Password
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Vault Stats & Content -->
        <div class="col-lg-8">
            <div class="row g-3 mb-4">
                <div class="col-sm-6">
                    <div
                            class="card border-0 shadow-sm h-100 bg-primary text-white dashboard-banner transition-hover">
                        <div class="card-body d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="opacity-75 mb-1">Total Protected Accounts</h6>
                                <h2 class="fw-bold mb-0" th:text="${totalAccounts}">0</h2>
                            </div>
                            <div class="bg-white bg-opacity-25 rounded-circle p-3">
                                <i class="bi bi-shield-lock-fill fs-3"></i>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6">
                    <div class="card border-0 shadow-sm h-100 border-start border-warning border-4">
                        <div class="card-body d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="text-muted mb-1">Favorite Accounts</h6>
                                <h2 class="fw-bold mb-0 text-warning" th:text="${favoriteCount}">0</h2>
                            </div>
                            <div class="bg-warning bg-opacity-10 rounded-circle p-3">
                                <i class="bi bi-star-fill text-warning fs-3"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Accounts Audit List -->
            <div class="card border-0 shadow-sm">
                <div
                        class="card-header bg-transparent border-bottom-0 pt-4 pb-0 d-flex justify-content-between align-items-center">
                    <h5 class="fw-bold mb-0"><i class="bi bi-list-check me-2 text-primary"></i>My Accounts</h5>

                    <!-- Unlock Audit Form -->
                    <form th:if="${!auditUnlocked}" th:action="@{/profile/audit}" method="post"
                          class="d-flex gap-2">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <div class="input-group input-group-sm" style="width: 250px;">
                            <input type="password" name="masterPassword" class="form-control"
                                   placeholder="Master Password" required>
                            <button type="submit" class="btn btn-primary" title="Unlock Detailed Security Audit">
                                <i class="bi bi-unlock-fill me-1"></i> Unlock Audit
                            </button>
                        </div>
                    </form>
                    <span th:if="${auditUnlocked}" class="badge bg-success"><i
                            class="bi bi-check-circle me-1"></i>Audit Unlocked</span>
                </div>

                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                            <tr>
                                <th>Account Name</th>
                                <th>Username</th>
                                <th>Category</th>
                                <th>Security Status</th>
                                <th>Action</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:if="${totalAccounts == 0}">
                                <td colspan="5" class="text-center text-muted py-4">
                                    <i class="bi bi-inbox fs-1 mb-2"></i>
                                    <p>No accounts saved in vault yet.</p>
                                </td>
                            </tr>
                            <tr th:each="entry : ${entries}">
                                <td>
                                    <div class="d-flex align-items-center">
                                        <i th:if="${entry.favorite}" class="bi bi-star-fill text-warning me-2"
                                           title="Favorite"></i>
                                        <i th:unless="${entry.favorite}"
                                           class="bi bi-globe2 text-secondary me-2"></i>
                                        <span class="fw-medium" th:text="${entry.accountName}">Google</span>
                                    </div>
                                </td>
                                <td class="text-muted"
                                    th:text="${entry.usernameOrEmail != null ? entry.usernameOrEmail : entry.username}">
                                    user@email.com</td>
                                <td><span class="badge bg-secondary" th:text="${entry.category}">WORK</span>
                                </td>
                                <td>
                                            <span th:if="${!auditUnlocked}" class="badge bg-secondary opacity-50"><i
                                                    class="bi bi-lock-fill"></i> Locked</span>
                                    <span th:if="${auditUnlocked}" class="badge"
                                          th:classappend="'bg-' + ${entry.securityBadge}"
                                          th:text="${entry.securityLabel}">Strong</span>
                                </td>
                                <td>
                                    <a th:href="@{/vault/view/{id}(id=${entry.id})}"
                                       class="btn btn-sm btn-outline-primary">
                                        <i class="bi bi-eye"></i> View
                                    </a>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Edit Profile Modal -->
<div class="modal fade" id="editProfileModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold"><i class="bi bi-pencil-square me-2 text-primary"></i>Edit Profile
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/profile/update}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">First Name</label>
                        <input type="text" name="firstName" class="form-control" th:value="${user.firstName}"
                               required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Last Name</label>
                        <input type="text" name="lastName" class="form-control" th:value="${user.lastName}"
                               required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" name="email" class="form-control" th:value="${user.email}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Phone Number</label>
                        <input type="tel" name="phoneNumber" class="form-control" th:value="${user.phoneNumber}">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
