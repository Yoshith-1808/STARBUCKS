<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Favorites')}"></head>
<body class="d-flex flex-column min-vh-100 bg-light">
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="container py-4 flex-grow-1">
    <div class="d-flex align-items-center mb-4">
        <a th:href="@{/vault}" class="btn btn-outline-secondary btn-sm me-3"><i class="bi bi-arrow-left"></i></a>
        <h3 class="fw-bold mb-0"><i class="bi bi-star-fill text-warning me-2"></i>Favorite Passwords</h3>
    </div>
    <div th:if="${#lists.isEmpty(entries)}" class="text-center py-5">
        <i class="bi bi-star text-muted" style="font-size:3rem"></i>
        <p class="text-muted mt-2">No favorites yet. Star passwords from your vault!</p>
        <a th:href="@{/vault}" class="btn btn-primary">Go to Vault</a>
    </div>
    <div th:unless="${#lists.isEmpty(entries)}" class="row g-3">
        <div th:each="entry : ${entries}" class="col-md-6 col-xl-4">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body">
                    <div class="d-flex align-items-center mb-2">
                        <div class="rounded-circle bg-warning bg-opacity-10 p-2 me-3">
                            <i class="bi bi-star-fill text-warning fs-5"></i>
                        </div>
                        <div>
                            <h6 class="fw-bold mb-0" th:text="${entry.accountName}"></h6>
                            <small class="text-muted" th:text="${entry.usernameOrEmail}"></small>
                        </div>
                    </div>
                    <span class="badge bg-secondary mb-2" th:text="${entry.category}"></span>
                    <div class="d-flex gap-2 mt-2">
                        <a th:href="@{/vault/view/{id}(id=${entry.id})}" class="btn btn-sm btn-outline-primary flex-grow-1">
                            <i class="bi bi-eye me-1"></i>View
                        </a>
                        <a th:href="@{/vault/edit/{id}(id=${entry.id})}" class="btn btn-sm btn-outline-secondary">
                            <i class="bi bi-pencil"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
