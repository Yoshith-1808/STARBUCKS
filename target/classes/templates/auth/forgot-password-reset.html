<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Forgot Password - Reset Password')}"></head>

<body class="bg-dark min-vh-100 d-flex align-items-center">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="text-center mb-4">
                <i class="bi bi-key text-primary" style="font-size:3rem"></i>
                <h2 class="text-white fw-bold mt-2">New Password</h2>
            </div>

            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-4">
                    <h5 class="card-title text-center mb-3">Create New Master Password</h5>
                    <p class="text-muted text-center small mb-4">You have successfully verified your identity.
                        Please enter a new strong master password below.</p>

                    <div th:if="${error}" class="alert alert-danger py-2">
                        <small th:text="${error}"></small>
                    </div>

                    <form th:action="@{/forgot-password/reset}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <div class="mb-3">
                            <label class="form-label fw-medium text-success">New Master Password *</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="bi bi-lock"></i></span>
                                <input type="password" name="newPassword" id="newPwd" class="form-control"
                                       required />
                                <button class="btn btn-outline-secondary" type="button"
                                        onclick="togglePwd('newPwd',this)">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-medium text-success">Confirm New Password *</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="bi bi-lock-fill"></i></span>
                                <input type="password" name="confirmPassword" id="confirmNewPwd"
                                       class="form-control" required />
                                <button class="btn btn-outline-secondary" type="button"
                                        onclick="togglePwd('confirmNewPwd',this)">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                        </div>

                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-primary btn-lg fw-semibold">
                                <i class="bi bi-check-circle me-1"></i>Reset Password
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function togglePwd(id, btn) {
        const input = document.getElementById(id);
        const icon = btn.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.className = 'bi bi-eye-slash';
        } else {
            input.type = 'password';
            icon.className = 'bi bi-eye';
        }
    }
</script>
</body>

</html>
