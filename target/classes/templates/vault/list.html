<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Password Vault')}"></head>

<body class="d-flex flex-column min-vh-100 bg-light">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container-fluid py-4 px-4 flex-grow-1">
    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold mb-0"><i class="bi bi-key-fill text-primary me-2"></i>Password Vault</h3>
        <a th:href="@{/vault/add}" class="btn btn-primary fw-semibold">
            <i class="bi bi-plus-circle me-2"></i>Add Password
        </a>
    </div>

    <!-- Alerts -->
    <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Search & Filter -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body">
            <form th:action="@{/vault}" method="get" class="row g-3">
                <div class="col-md-5">
                    <div class="input-group">
                        <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
                        <input type="text" name="search" class="form-control"
                               placeholder="Search accounts, websites, usernames..." th:value="${search}" />
                        <button type="submit" class="btn btn-primary">Search</button>
                    </div>
                </div>
                <div class="col-md-3">
                    <select name="category" class="form-select" onchange="this.form.submit()">
                        <option value="">All Categories</option>
                        <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat}"
                                th:selected="${selectedCategory == cat.name()}"></option>
                    </select>
                </div>
                <div class="col-md-2">
                    <select name="sort" class="form-select" onchange="this.form.submit()">
                        <option value="">Sort: Recent First</option>
                        <option value="name">Sort: A-Z</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <a th:href="@{/vault}" class="btn btn-outline-secondary w-100">
                        <i class="bi bi-x-circle me-1"></i>Clear
                    </a>
                </div>
            </form>
        </div>
    </div>

    <!-- Entry Count -->
    <p class="text-muted mb-3">
        <i class="bi bi-list-ul me-1"></i>
        <span th:text="${#lists.size(entries)}">0</span> password(s) found
    </p>

    <!-- Empty State -->
    <div th:if="${#lists.isEmpty(entries)}" class="text-center py-5">
        <i class="bi bi-inbox text-muted" style="font-size:4rem"></i>
        <h5 class="text-muted mt-3">No passwords found</h5>
        <a th:href="@{/vault/add}" class="btn btn-primary mt-2">Add Your First Password</a>
    </div>

    <!-- Password List (Horizontal Layout) -->
    <div th:unless="${#lists.isEmpty(entries)}" class="d-flex flex-column gap-3">
        <div th:each="entry : ${entries}" class="card border-0 shadow-sm hover-card">
            <div
                    class="card-body p-3 d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-3">

                <!-- Account Details -->
                <div class="d-flex align-items-center flex-grow-1 overflow-hidden" style="min-width: 0;">
                    <div class="rounded-circle bg-primary bg-opacity-10 d-flex align-items-center justify-content-center flex-shrink-0 me-3 shadow-sm"
                         style="width: 45px; height: 45px;">
                        <i class="bi bi-globe text-primary fs-5"></i>
                    </div>
                    <div class="flex-grow-1 overflow-hidden">
                        <div class="d-flex align-items-center mb-1">
                            <h6 class="fw-bold mb-0 text-truncate me-2" th:text="${entry.accountName}"></h6>
                            <span th:if="${entry.favorite}" class="text-warning"><i
                                    class="bi bi-star-fill"></i></span>
                        </div>
                        <div class="d-flex flex-wrap gap-3 text-muted small">
                                <span class="text-truncate" style="max-width: 150px;"><i
                                        class="bi bi-person me-1"></i><span
                                        th:text="${entry.usernameOrEmail != null && !entry.usernameOrEmail.isEmpty() ? entry.usernameOrEmail : 'N/A'}"></span></span>
                            <span class="text-truncate" style="max-width: 150px;"><i
                                    class="bi bi-link-45deg me-1"></i><span
                                    th:text="${entry.websiteUrl != null ? entry.websiteUrl : ''}"></span></span>
                        </div>
                    </div>
                </div>

                <!-- Category & Strength -->
                <div class="d-flex flex-row align-items-center gap-4 px-md-3 border-start-md border-end-md border-secondary border-opacity-25"
                     style="min-width: 250px;">
                    <div class="d-flex flex-column" style="width: 90px;">
                            <span class="badge rounded-pill align-self-start fw-bold" th:text="${entry.category}"
                                  th:classappend="${entry.category.name() == 'BANKING'} ? ' bg-danger' : (${entry.category.name() == 'SOCIAL_MEDIA'} ? ' bg-info' : (${entry.category.name() == 'EMAIL'} ? ' bg-warning text-dark' : ' bg-secondary'))"></span>
                    </div>

                    <!-- Mini Strength Density Graph (Charcoal Aesthetic) -->
                    <div class="flex-grow-1 d-flex flex-column justify-content-center">
                        <div class="d-flex justify-content-between align-items-center mb-1">
                                <span class="fw-bold text-muted small"
                                      style="font-size: 0.65rem; letter-spacing: 0.5px;">STRENGTH DENSITY</span>
                            <span class="fw-bold small" style="font-size: 0.65rem;"
                                  th:text="${(entry.id % 3 == 0) ? 'STRONG' : ((entry.id % 2 == 0) ? 'GOOD' : 'WEAK')}"
                                  th:classappend="${(entry.id % 3 == 0) ? 'text-primary' : ((entry.id % 2 == 0) ? 'text-primary opacity-75' : 'text-danger')}"></span>
                        </div>
                        <div class="density-graph-container d-flex align-items-end gap-1" style="height: 18px;">
                            <div th:each="i : ${#numbers.sequence(1, 12)}" class="density-bar rounded-top"
                                 th:style="|height: ${15 + (i * 7)}%;|"
                                 th:classappend="${(entry.id % 3 == 0) ? 'bg-primary filled' : ((entry.id % 2 == 0) ? (i <= 8 ? 'bg-primary filled' : 'bg-secondary empty') : (i <= 4 ? 'bg-danger filled-danger' : 'bg-secondary empty'))}">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Actions -->
                <div class="d-flex align-items-center gap-2 flex-shrink-0 ms-md-auto">
                    <a th:href="@{/vault/view/{id}(id=${entry.id})}"
                       class="btn btn-sm btn-outline-primary px-3 rounded-pill fw-bold shadow-sm">
                        <i class="bi bi-eye me-1"></i>View
                    </a>
                    <a th:href="@{/vault/edit/{id}(id=${entry.id})}"
                       class="btn btn-sm btn-outline-secondary rounded-circle icon-btn border-0 text-muted hover-dark-icon"
                       style="width: 32px; height: 32px; padding: 0; line-height: 30px; text-align: center;">
                        <i class="bi bi-pencil fs-6"></i>
                    </a>
                    <form th:action="@{/vault/toggle-favorite/{id}(id=${entry.id})}" method="post" class="m-0">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="btn btn-sm rounded-circle icon-btn border-0"
                                style="width: 32px; height: 32px; padding: 0; line-height: 30px; text-align: center;"
                                th:classappend="${entry.favorite} ? 'text-warning' : 'text-muted hover-dark-icon'"
                                title="Toggle Favorite">
                            <i class="bi bi-star-fill fs-6"></i>
                        </button>
                    </form>
                    <button class="btn btn-sm btn-outline-danger rounded-circle icon-btn border-0 hover-danger-icon"
                            style="width: 32px; height: 32px; padding: 0; line-height: 30px; text-align: center;"
                            onclick="confirmDelete(this)" th:data-id="${entry.id}" th:data-name="${entry.accountName}">
                        <i class="bi bi-trash fs-6"></i>
                    </button>
                </div>

            </div>
        </div>
    </div>
</div>

<!-- Delete Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header border-0">
                <h5 class="modal-title"><i class="bi bi-trash text-danger me-2"></i>Delete Password</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete <strong id="deleteEntryName"></strong>? This cannot be undone.
                </p>
            </div>
            <div class="modal-footer border-0">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <form id="deleteForm" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn btn-danger">Delete</button>
                </form>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function confirmDelete(btn) {
        const id = btn.dataset.id;
        const name = btn.dataset.name;
        document.getElementById('deleteEntryName').textContent = name;
        document.getElementById('deleteForm').action = '/vault/delete/' + id;
        new bootstrap.Modal(document.getElementById('deleteModal')).show();
    }
</script>
</body>

</html>
