<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Forgot Password - Email OTP')}"></head>

<body class="bg-dark min-vh-100 d-flex align-items-center">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="text-center mb-4">
                <i class="bi bi-envelope-check text-primary" style="font-size:3rem"></i>
                <h2 class="text-white fw-bold mt-2">Email Recovery</h2>
            </div>

            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-4">
                    <h5 class="card-title text-center mb-3">Send Reset Code</h5>
                    <p class="text-muted text-center small mb-4">Enter the email address associated with your
                        account to receive a 6-digit OTP.</p>

                    <div th:if="${error}" class="alert alert-danger py-2">
                        <small th:text="${error}"></small>
                    </div>

                    <form th:action="@{/forgot-password/send-otp}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <div class="mb-4">
                            <label class="form-label fw-medium">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="bi bi-envelope"></i></span>
                                <input type="email" name="email" class="form-control" required autofocus />
                            </div>
                        </div>

                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-primary btn-lg fw-semibold">
                                Send OTP
                            </button>
                        </div>

                        <div class="text-center">
                            <a th:href="@{/forgot-password}" class="text-decoration-none text-muted small">
                                <i class="bi bi-arrow-left me-1"></i>Go Back
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
