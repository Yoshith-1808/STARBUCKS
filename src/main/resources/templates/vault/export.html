<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Export Vault')}"></head>
<body class="d-flex flex-column min-vh-100 bg-light">
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="container py-4 flex-grow-1">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h3 class="fw-bold mb-4"><i class="bi bi-download me-2 text-primary"></i>Export Vault</h3>
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <div class="alert alert-warning">
                        <i class="bi bi-exclamation-triangle me-2"></i>
                        Your vault will be exported as an <strong>encrypted backup</strong>. Keep this file secure.
                    </div>
                    <form id="exportForm" th:action="@{/vault/export}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div class="mb-3">
                            <label class="form-label fw-medium">Master Password</label>
                            <input type="password" name="masterPassword" class="form-control" required placeholder="Confirm master password"/>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary fw-semibold">
                                <i class="bi bi-download me-2"></i>Export Encrypted Backup
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById('exportForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const formData = new FormData(this);
    fetch(this.action, { method: 'POST', body: formData })
        .then(r => r.text())
        .then(data => {
            const blob = new Blob([data], {type:'text/plain'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'vault-backup.enc'; a.click();
            URL.revokeObjectURL(url);
        });
});
</script>
</body>
</html>
