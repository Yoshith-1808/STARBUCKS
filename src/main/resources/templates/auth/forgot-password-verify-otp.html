<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Forgot Password - Verify OTP')}"></head>

<body class="bg-dark min-vh-100 d-flex align-items-center">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="text-center mb-4">
                <i class="bi bi-shield-check text-primary" style="font-size:3rem"></i>
                <h2 class="text-white fw-bold mt-2">Verify Code</h2>
            </div>

            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-4">
                    <h5 class="card-title text-center mb-3">Enter OTP</h5>
                    <p class="text-muted text-center small mb-4">
                        Please enter the 6-digit verification code sent to <br>
                        <strong class="text-dark" th:text="${session.resetEmail}"></strong>
                    </p>

                    <div th:if="${error}" class="alert alert-danger py-2">
                        <small th:text="${error}"></small>
                    </div>
                    <div th:if="${success}" class="alert alert-success py-2">
                        <small th:text="${success}"></small>
                    </div>

                    <form th:action="@{/forgot-password/verify-otp}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <div class="mb-4 text-center">
                            <input type="text" name="otp"
                                   class="form-control form-control-lg text-center fw-bold letter-spacing-2"
                                   placeholder="000000" maxlength="6" pattern="[0-9]{6}" required autofocus
                                   style="letter-spacing: 0.5em;" />
                            <small class="text-muted d-block mt-2">Code expires in 15 minutes.</small>
                        </div>

                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-primary btn-lg fw-semibold">
                                Verify & Proceed
                            </button>
                        </div>

                        <div class="text-center">
                            <a th:href="@{/forgot-password/email}" class="text-decoration-none text-muted small">
                                <i class="bi bi-arrow-left me-1"></i>Try a different email
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
