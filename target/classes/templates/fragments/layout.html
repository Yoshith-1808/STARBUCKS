<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:fragment="head(title)">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${title} + ' - SecureVault'">SecureVault</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet" />
    <link th:href="@{/css/style.css}" rel="stylesheet" />
    <script>
        // Apply theme immediately to prevent flash
        const storedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', storedTheme);

        // Setup toggler after DOM loads
        document.addEventListener('DOMContentLoaded', () => {
            const toggleSwitch = document.getElementById('themeToggleSwitch');
            const icon = document.getElementById('themeToggleIcon');

            if (toggleSwitch) {
                const isDark = document.documentElement.getAttribute('data-bs-theme') === 'dark';
                toggleSwitch.checked = isDark;
                if (icon) icon.className = isDark ? 'bi bi-moon-stars-fill text-light' : 'bi bi-sun-fill text-warning';

                toggleSwitch.addEventListener('change', function () {
                    const nextTheme = this.checked ? 'dark' : 'light';
                    document.documentElement.setAttribute('data-bs-theme', nextTheme);
                    localStorage.setItem('theme', nextTheme);
                    if (icon) icon.className = nextTheme === 'dark' ? 'bi bi-moon-stars-fill text-light' : 'bi bi-sun-fill text-warning';
                });
            }
        });
    </script>
</head>

<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg sticky-top shadow-sm">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">
            <i class="bi bi-shield-lock-fill me-2"></i>SecureVault
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/dashboard}"><i class="bi bi-speedometer2 me-1"></i>Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/vault}"><i class="bi bi-key-fill me-1"></i>Vault</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/generator}"><i class="bi bi-shuffle me-1"></i>Generator</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/security/audit}"><i
                            class="bi bi-shield-check me-1"></i>Security</a>
                </li>
            </ul>
            <ul class="navbar-nav align-items-center">
                <!-- Theme Toggle Switch -->
                <li class="nav-item me-4 d-flex align-items-center">
                    <div class="form-check form-switch mb-0 fs-5 d-flex align-items-center"
                         title="Toggle Dark/Light Mode">
                        <input class="form-check-input mt-0 me-2 shadow-none" type="checkbox" role="switch"
                               id="themeToggleSwitch" style="cursor: pointer;">
                        <label class="form-check-label d-flex align-items-center" for="themeToggleSwitch"
                               style="cursor: pointer; margin-top:2px;">
                            <i id="themeToggleIcon" class="bi bi-sun-fill text-warning"></i>
                        </label>
                    </div>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle d-flex align-items-center" href="#"
                       data-bs-toggle="dropdown">
                        <div class="scifi-avatar-glow me-2"
                             style="width: 32px; height: 32px; border-width: 1px; box-shadow: none;">
                            <img src="https://i.pinimg.com/736x/db/a8/6f/dba86f36d8086ae994d1f87e94ea6307.jpg"
                                 onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'%23f1f1f1\'><path d=\'M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z\'/></svg>'"
                                 alt="Avatar" class="scifi-avatar-img" style="width: 28px; height: 28px;">
                        </div>
                        <span sec:authentication="name" class="fw-medium">User</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0">
                        <li><a class="dropdown-item" th:href="@{/profile}"><i
                                class="bi bi-person me-2"></i>Profile</a></li>
                        <li><a class="dropdown-item" th:href="@{/security/2fa}"><i
                                class="bi bi-shield-lock me-2"></i>2FA Settings</a></li>
                        <li>
                            <hr class="dropdown-divider" />
                        </li>
                        <li>
                            <form th:action="@{/auth/logout}" method="post">
                                <button class="dropdown-item text-danger" type="submit">
                                    <i class="bi bi-box-arrow-right me-2"></i>Logout
                                </button>
                            </form>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<footer th:fragment="footer" class="py-3 mt-auto border-top">
    <div class="container text-center">
        <small class="text-muted"><i class="bi bi-shield-check-fill text-primary"></i> SecureVault &copy; 2026 - All
            data encrypted with AES-256</small>
    </div>
</footer>

</body>

</html>
